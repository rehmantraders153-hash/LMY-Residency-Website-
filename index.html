<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LMY Residency</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
        }
        header {
            background-color: #1a1a2e;
            color: white;
            padding: 20px;
            text-align: center;
        }
        header h1 {
            font-size: 2em;
            margin-bottom: 5px;
        }
        header p {
            color: #d4af6e;
            font-size: 0.9em;
        }
        nav {
            background-color: #16213e;
            padding: 15px;
            display: flex;
            justify-content: center;
            gap: 20px;
        }
        nav a {
            color: white;
            text-decoration: none;
            padding: 8px 15px;
            border-radius: 5px;
            transition: 0.3s;
        }
        nav a:hover {
            background-color: #d4af6e;
            color: #1a1a2e;
        }
        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 20px;
        }
        .hero {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 60px 20px;
            text-align: center;
            border-radius: 10px;
            margin-bottom: 40px;
        }
        .hero h2 {
            font-size: 2.5em;
            margin-bottom: 20px;
        }
        .hero p {
            font-size: 1.2em;
            margin-bottom: 30px;
        }
        .btn {
            display: inline-block;
            padding: 12px 30px;
            background-color: #d4af6e;
            color: #1a1a2e;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            font-size: 1em;
            transition: 0.3s;
        }
        .btn:hover {
            background-color: #c9a04f;
        }
        .properties {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }
        .property-card {
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            transition: transform 0.3s;
        }
        .property-card:hover {
            transform: translateY(-5px);
        }
        .property-image {
            width: 100%;
            height: 200px;
            background-color: #ddd;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #999;
            font-size: 3em;
        }
        .property-info {
            padding: 20px;
        }
        .property-info h3 {
            color: #1a1a2e;
            margin-bottom: 10px;
        }
        .property-info p {
            color: #666;
            margin-bottom: 10px;
            font-size: 0.9em;
        }
        .price {
            color: #d4af6e;
            font-weight: bold;
            font-size: 1.3em;
            margin: 10px 0;
        }
        footer {
            background-color: #1a1a2e;
            color: white;
            text-align: center;
            padding: 20px;
            margin-top: 40px;
        }
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.6);
        }
        .modal-content {
            background-color: white;
            margin: 10% auto;
            padding: 30px;
            border-radius: 10px;
            width: 90%;
            max-width: 400px;
        }
        .close {
            color: #aaa;
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
        }
        .close:hover {
            color: black;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #333;
        }
        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <header>
        <h1>LMY Residency</h1>
        <p>✨ Where comfort feels luxury ✨</p>
    </header>

    <nav>
        <a href="#home">Home</a>
        <a href="#properties">Properties</a>
        <a href="#about">About</a>
        <a href="#contact">Contact</a>
        <a href="javascript:openLoginModal()" style="background-color: #d4af6e; color: #1a1a2e;">Login</a>
    </nav>

    <div class="container">
        <div class="hero">
            <h2>Welcome to Luxury Living</h2>
            <p>Discover our premium serviced apartments across Asia</p>
            <button class="btn" onclick="openBookingModal()">Book Your Stay</button>
        </div>

        <h2 id="properties" style="margin: 40px 0 20px; text-align: center; color: #1a1a2e;">Featured Properties</h2>
        <div class="properties" id="propertiesContainer">
        </div>
    </div>

    <div id="loginModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeLoginModal()">&times;</span>
            <h2>Guest Login</h2>
            <div style="margin-top: 20px;">
                <div class="form-group">
                    <label>Email:</label>
                    <input type="email" id="loginEmail" placeholder="your@email.com">
                </div>
                <div class="form-group">
                    <label>Password:</label>
                    <input type="password" id="loginPassword" placeholder="Password">
                </div>
                <button class="btn" style="width: 100%; margin-top: 20px;" onclick="handleLogin()">Sign In</button>
            </div>
        </div>
    </div>

    <div id="bookingModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeBookingModal()">&times;</span>
            <h2>Book Your Stay</h2>
            <div style="margin-top: 20px;">
                <div class="form-group">
                    <label>Check-in Date:</label>
                    <input type="date" id="checkInDate">
                </div>
                <div class="form-group">
                    <label>Check-out Date:</label>
                    <input type="date" id="checkOutDate">
                </div>
                <div class="form-group">
                    <label>Adults:</label>
                    <input type="number" id="adults" value="1" min="1">
                </div>
                <div class="form-group">
                    <label>Children:</label>
                    <input type="number" id="children" value="0" min="0">
                </div>
                <button class="btn" style="width: 100%; margin-top: 20px;" onclick="handleBooking()">Search Properties</button>
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2024 LMY Residency. All rights reserved.</p>
        <p>Where comfort feels luxury ✨</p>
    </footer>

    <script>
        const properties = [
            {
                id: 1,
                name: "Elysium Tower - Studio",
                location: "Islamabad, Pakistan",
                price: 8500,
                image: "🏢"
            },
            {
                id: 2,
                name: "Gold Crest DHA - One Bed",
                location: "Lahore, Pakistan",
                price: 11000,
                image: "🏠"
            },
            {
                id: 3,
                name: "Princess Tower - Studio",
                location: "Dubai, UAE",
                price: 450,
                image: "🏬"
            },
            {
                id: 4,
                name: "Indigo Gulberg - Studio",
                location: "Lahore, Pakistan",
                price: 8000,
                image: "🏘️"
            },
            {
                id: 5,
                name: "Mountain Retreat - Studio",
                location: "Murree, Pakistan",
                price: 6500,
                image: "🏔️"
            },
            {
                id: 6,
                name: "JBR Beachfront - One Bed",
                location: "Dubai, UAE",
                price: 650,
                image: "🏖️"
            }
        ];

        window.addEventListener('load', function() {
            loadProperties();
        });

        function loadProperties() {
            const container = document.getElementById('propertiesContainer');
            container.innerHTML = properties.map(prop => `
                <div class="property-card">
                    <div class="property-image">${prop.image}</div>
                    <div class="property-info">
                        <h3>${prop.name}</h3>
                        <p>📍 ${prop.location}</p>
                        <div class="price">Rs ${prop.price}/night</div>
                        <button class="btn" style="width: 100%;" onclick="openBookingModal()">Book Now</button>
                    </div>
                </div>
            `).join('');
        }

        function openLoginModal() {
            document.getElementById('loginModal').style.display = 'block';
        }

        function closeLoginModal() {
            document.getElementById('loginModal').style.display = 'none';
        }

        function openBookingModal() {
            document.getElementById('bookingModal').style.display = 'block';
        }

        function closeBookingModal() {
            document.getElementById('bookingModal').style.display = 'none';
        }

        function handleLogin() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            
            if (email && password) {
                alert('Login successful! Welcome ' + email);
                localStorage.setItem('loggedInUser', email.split('@')[0]);
                closeLoginModal();
            } else {
                alert('Please fill in all fields');
            }
        }

        function handleBooking() {
            const checkIn = document.getElementById('checkInDate').value;
            const checkOut = document.getElementById('checkOutDate').value;
            const adults = document.getElementById('adults').value;
            
            if (checkIn && checkOut) {
                alert(`Booking request: ${adults} adult(s) from ${checkIn} to ${checkOut}`);
                closeBookingModal();
            } else {
                alert('Please select dates');
            }
        }

        window.onclick = function(event) {
            let loginModal = document.getElementById('loginModal');
            let bookingModal = document.getElementById('bookingModal');
            
            if (event.target == loginModal) {
                loginModal.style.display = 'none';
            }
            if (event.target == bookingModal) {
                bookingModal.style.display = 'none';
            }
        }
    </script>
</body>
</html>
